server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/planflow?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 1200000

  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 20MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
    banner: false

planflow:
  jwt:
    secret: ${JWT_SECRET:planflow-default-secret-key-change-in-production-32chars}
    expiration: 86400000

ai:
  ocr:
    url: ${AI_OCR_URL:http://localhost:5000/ocr}
  analysis:
    url: ${AI_ANALYSIS_URL:http://localhost:5000/analyze}
