services:
  mysql:
    image: mysql:8.0
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-planflow123}
      - MYSQL_DATABASE=planflow
    volumes:
      - mysql-data:/var/lib/mysql
      - ./backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT:-18080}:8080"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - DB_HOST=mysql
      - DB_PASSWORD=${DB_PASSWORD:-planflow123}
      - JWT_SECRET=${JWT_SECRET:-default-dev-secret-change-in-production}
      - JWT_EXPIRATION=${JWT_EXPIRATION:-86400000}
      - JWT_REMEMBER_EXPIRATION=${JWT_REMEMBER_EXPIRATION:-2592000000}
      - AI_PROVIDER=${AI_PROVIDER:-deepseek}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - DEEPSEEK_BASE_URL=${DEEPSEEK_BASE_URL:-https://api.deepseek.com/v1}
      - DEEPSEEK_MODEL=${DEEPSEEK_MODEL:-deepseek-v4-pro}
      - QWEN_API_KEY=${QWEN_API_KEY:-}
      - QWEN_BASE_URL=${QWEN_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      - QWEN_MODEL=${QWEN_MODEL:-qwen3.7-plus}
      - OPENAI_COMPATIBLE_API_KEY=${OPENAI_COMPATIBLE_API_KEY:-}
      - OPENAI_COMPATIBLE_BASE_URL=${OPENAI_COMPATIBLE_BASE_URL:-}
      - OPENAI_COMPATIBLE_MODEL=${OPENAI_COMPATIBLE_MODEL:-}
      - EMAIL_NOTIFICATION_ENABLED=${EMAIL_NOTIFICATION_ENABLED:-false}
      - EMAIL_NOTIFICATION_PROVIDER=${EMAIL_NOTIFICATION_PROVIDER:-smtp}
      - EMAIL_NOTIFICATION_FROM=${EMAIL_NOTIFICATION_FROM:-}
      - SMS_NOTIFICATION_ENABLED=${SMS_NOTIFICATION_ENABLED:-false}
      - SMS_NOTIFICATION_PROVIDER=${SMS_NOTIFICATION_PROVIDER:-aliyun}
      - CORS_ALLOWED_ORIGIN_PATTERNS=${CORS_ALLOWED_ORIGIN_PATTERNS:-http://localhost:*,http://127.0.0.1:*}
      - OCR_SERVICE_URL=http://ocr-service:8000/ocr/image
      - OCR_ENABLED=true
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy

  ocr-service:
    build: ./ocr-service
    ports:
      - "${OCR_PORT:-8000}:8000"
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      - mysql

  nginx:
    image: nginx:alpine
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    environment:
      - TZ=${TZ:-Asia/Shanghai}
    depends_on:
      - backend

volumes:
  mysql-data:
  uploads-data:
